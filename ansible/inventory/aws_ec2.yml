plugin: amazon.aws.aws_ec2
regions:
  - ap-south-1

filters:
  instance-state-name: running

keyed_groups:
 -  keys: tags.Name
    prefix: tag
    separator: _

hostnames:
  - public-ip-address 

compose:
  ansible_host: public_ip_address
  ansible_user: "'ubuntu'"
  ansible_ssh_private_key_file: "./instance-key.pem"
